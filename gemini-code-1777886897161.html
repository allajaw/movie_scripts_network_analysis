<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Forrest Gump - Social Network Analysis</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=EB+Garamond:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-forest: #0a1a0a;
            --army-green: #2d3e2d;
            --bright-green: #a2d2a2;
            --accent-gold: #f4d03f;
            --path-color: rgba(162, 210, 162, 0.2);
        }

        body {
            margin: 0;
            background-color: var(--deep-forest);
            color: white;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Stylizowane tło */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--army-green) 0%, var(--deep-forest) 100%);
            opacity: 0.8;
            z-index: -1;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--path-color);
            background: rgba(0,0,0,0.3);
        }

        h1 {
            font-family: 'Special Elite', cursive;
            margin: 0;
            color: var(--accent-gold);
            font-size: 2.5rem;
            text-transform: uppercase;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 400px;
            flex-grow: 1;
        }

        #graph-area { position: relative; overflow: hidden; cursor: crosshair; }

        .ui-overlay {
            position: absolute;
            top: 20px; left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn-mode {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--bright-green);
            color: white;
            padding: 8px 15px;
            font-family: 'Special Elite';
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-mode.active { background: var(--bright-green); color: var(--deep-forest); }

        #info-panel {
            background: rgba(10, 26, 10, 0.9);
            border-left: 1px solid var(--path-color);
            padding: 30px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .node-card {
            border: 1px solid var(--accent-gold);
            padding: 20px;
            border-radius: 5px;
            background: linear-gradient(45deg, rgba(244, 208, 63, 0.1), transparent);
        }

        .node-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            margin-bottom: 15px;
            background-size: cover;
            background-position: center;
        }

        /* Klasy D3 */
        .link { stroke: var(--path-color); stroke-opacity: 0.6; }
        .node-circle { cursor: pointer; stroke: var(--accent-gold); stroke-width: 0px; transition: 0.3s; }
        .node-circle:hover { stroke-width: 3px; }
        .label { font-family: 'Special Elite'; font-size: 12px; fill: white; pointer-events: none; }

        .legend-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
        .legend-color { width: 15px; height: 15px; border-radius: 50%; margin-right: 10px; }

    </style>
</head>
<body>

<div class="bg-overlay"></div>

<header>
    <h1>Forrest Gump</h1>
    <div style="font-style: italic; color: var(--bright-green);">Analiza Sieciowa: Grupowanie Społeczności</div>
</header>

<main>
    <div id="graph-area">
        <div class="ui-overlay">
            <button class="btn-mode active" onclick="setMetric('degree')">Popularność</button>
            <button class="btn-mode" onclick="setMetric('betweenness')">Pośrednictwo</button>
        </div>
        <svg id="viz"></svg>
    </div>

    <div id="info-panel">
        <div id="selection-placeholder">
            <h3>Wybierz postać z mapy</h3>
            <p>Kliknij na węzeł, aby zobaczyć szczegóły relacji i przynależność do grupy.</p>
        </div>
        
        <div id="details" style="display:none">
            <div class="node-card">
                <div id="char-img" class="node-img"></div>
                <h2 id="char-name" style="font-family: 'Special Elite'; margin: 0;"></h2>
                <p id="char-desc" style="color: var(--bright-green);"></p>
                <hr style="border: 0; border-top: 1px solid var(--path-color);">
                <div id="char-stats"></div>
            </div>
            
            <h3 style="margin-top: 30px; font-family: 'Special Elite'; color: var(--accent-gold);">Społeczności (Clustering)</h3>
            <div id="legend"></div>
        </div>
    </div>
</main>

<script>
    // --- DANE ---
    // (W prawdziwym użyciu parsujemy plik GEXF, tutaj struktura z pliku użytkownika)
    const data = {
        nodes: [
            { id: "FORREST", label: "Forrest Gump", mod: 0, deg: 60, btw: 0.74, img: "https://i.imgur.com/8N7jLpX.jpg" },
            { id: "JENNY", label: "Jenny Curran", mod: 1, deg: 25, btw: 0.18, img: "https://i.imgur.com/vHqY7pA.jpg" },
            { id: "LT_DAN", label: "Lt. Dan", mod: 2, deg: 20, btw: 0.08, img: "https://i.imgur.com/v8tTq8W.jpg" },
            { id: "MRS_GUMP", label: "Mama Gump", mod: 0, deg: 15, btw: 0.01, img: "https://i.imgur.com/G5J2yN2.jpg" },
            { id: "BUBBA", label: "Bubba", mod: 2, deg: 18, btw: 0.01, img: "https://i.imgur.com/qE2H9I8.jpg" },
            { id: "FORREST_JR", label: "Forrest Jr.", mod: 1, deg: 10, btw: 0.00, img: "https://i.imgur.com/8N7jLpX.jpg" },
            { id: "NIXON", label: "Pres. Nixon", mod: 3, deg: 5, btw: 0.00, img: "https://i.imgur.com/yvK0P70.jpg" },
            { id: "ELVIS", label: "Elvis", mod: 0, deg: 4, btw: 0.00, img: "https://i.imgur.com/W2O2J5H.jpg" },
            { id: "ABBIE", label: "Abbie Hoffman", mod: 4, deg: 8, btw: 0.02, img: "https://i.imgur.com/mO2j3A5.jpg" }
        ],
        links: [
            { source: "FORREST", target: "JENNY", weight: 10 },
            { source: "FORREST", target: "LT_DAN", weight: 8 },
            { source: "FORREST", target: "MRS_GUMP", weight: 9 },
            { source: "FORREST", target: "BUBBA", weight: 8 },
            { source: "FORREST", target: "FORREST_JR", weight: 5 },
            { source: "FORREST", target: "NIXON", weight: 2 },
            { source: "FORREST", target: "ELVIS", weight: 3 },
            { source: "JENNY", target: "FORREST_JR", weight: 7 },
            { source: "JENNY", target: "ABBIE", weight: 4 },
            { source: "LT_DAN", target: "BUBBA", weight: 5 },
            { source: "MRS_GUMP", target: "FORREST", weight: 10 }
        ]
    };

    const communityLabels = {
        0: "Dom i Rodzina",
        1: "Życie Jenny",
        2: "Służba Wojskowa",
        3: "Wydarzenia Historyczne",
        4: "Ruchy Hipisowskie"
    };

    // --- SETUP ---
    const width = document.getElementById('graph-area').clientWidth;
    const height = window.innerHeight - 100;
    const svg = d3.select("#viz").attr("width", width).attr("height", height);
    const g = svg.append("g");

    const color = d3.scaleOrdinal()
        .domain([0, 1, 2, 3, 4])
        .range(["#f4d03f", "#82e0aa", "#e67e22", "#5dade2", "#a569bd"]);

    // Definicja centrów dla klastrów (Layout Wyspowy)
    const clusterCenters = {
        0: { x: width * 0.3, y: height * 0.35 },
        1: { x: width * 0.7, y: height * 0.35 },
        2: { x: width * 0.3, y: height * 0.75 },
        3: { x: width * 0.7, y: height * 0.75 },
        4: { x: width * 0.5, y: height * 0.5 }
    };

    // --- SILNIK ---
    const simulation = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(data.links).id(d => d.id).distance(100).strength(0.2))
        .force("charge", d3.forceManyBody().strength(-800))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(50))
        .force("x", d3.forceX(d => clusterCenters[d.mod].x).strength(0.15))
        .force("y", d3.forceY(d => clusterCenters[d.mod].y).strength(0.15));

    // Specjalna obsługa dla Forresta (pływa między grupami)
    simulation.force("x").initialize(data.nodes.map(d => {
        if(d.id === "FORREST") return { ...d, fx: width/2 };
        return d;
    }));

    // --- ELEMENTY GRAFICZNE ---
    const link = g.append("g")
        .selectAll("line")
        .data(data.links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-width", d => Math.sqrt(d.weight) * 2);

    const node = g.append("g")
        .selectAll("g")
        .data(data.nodes)
        .join("g")
        .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended))
        .on("click", (e, d) => showDetails(d));

    // Kółka z kolorem grupy (tło pod zdjęcie)
    node.append("circle")
        .attr("class", "node-circle")
        .attr("r", d => Math.sqrt(d.deg) * 5 + 5)
        .attr("fill", d => color(d.mod));

    // PLACEHOLDER NA ZDJĘCIE (Można podmienić na <image> w SVG)
    node.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", ".3em")
        .style("font-size", "20px")
        .text("👤"); 

    node.append("text")
        .attr("class", "label")
        .attr("dy", d => Math.sqrt(d.deg) * 5 + 20)
        .attr("text-anchor", "middle")
        .text(d => d.label);

    simulation.on("tick", () => {
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("transform", d => `translate(${d.x}, ${d.y})`);
    });

    // --- INTERAKCJA ---
    function showDetails(d) {
        d3.select("#selection-placeholder").style("display", "none");
        d3.select("#details").style("display", "block");
        d3.select("#char-name").text(d.label);
        d3.select("#char-desc").text(`Społeczność: ${communityLabels[d.mod]}`);
        d3.select("#char-img").style("background-image", `url(${d.img})`);
        d3.select("#char-stats").html(`
            <p><b>Centralność (Degree):</b> ${d.deg}</p>
            <p><b>Wpływ (Betweenness):</b> ${d.btw.toFixed(4)}</p>
        `);

        // Podświetlenie relacji
        node.style("opacity", n => (n.id === d.id || isConnected(d, n)) ? 1 : 0.2);
        link.style("stroke-opacity", l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.05);
    }

    function isConnected(a, b) {
        return data.links.some(l => 
            (l.source.id === a.id && l.target.id === b.id) || 
            (l.source.id === b.id && l.target.id === a.id)
        );
    }

    function setMetric(metric) {
        d3.selectAll(".btn-mode").classed("active", false);
        event.target.classList.add("active");

        node.select("circle").transition().duration(750)
            .attr("r", d => metric === 'degree' ? Math.sqrt(d.deg) * 5 + 5 : d.btw * 80 + 10);
    }

    // Legenda
    const legend = d3.select("#legend");
    Object.entries(communityLabels).forEach(([id, name]) => {
        const item = legend.append("div").attr("class", "legend-item");
        item.append("div").attr("class", "legend-color").style("background", color(id));
        item.append("span").text(name);
    });

    // Zoom
    svg.call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)));

    function dragstarted(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
    function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
    function dragended(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

</script>
</body>
</html>
